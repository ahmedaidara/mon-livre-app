<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Cotisations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Orbitron:wght@400;500;600;700&display=swap');
        
        :root {
            --primary-color: #073332;
            --secondary-color: #1f4a49;
            --accent-color: #9b9c28;
            --bg-color: #073332;
            --text-color: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --primary-light: #0a4a48;
            --accent-light: #b5b632;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        .dynamic-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 30% 40%, var(--primary-light) 0%, transparent 25%),
                        radial-gradient(circle at 70% 60%, var(--secondary-color) 0%, transparent 25%);
            opacity: 0.4;
            z-index: -1;
            animation: bgMovement 30s infinite alternate ease-in-out;
        }

        @keyframes bgMovement {
            0% { transform: scale(1) rotate(0deg); background-position: 0% 0%; }
            50% { transform: scale(1.1) rotate(5deg); background-position: 50% 50%; }
            100% { transform: scale(1) rotate(0deg); background-position: 100% 100%; }
        }
        
        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            z-index: 10;
            padding: 20px;
            overflow-y: auto;
        }
        
        .main-menu {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        
        .menu-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 0.2rem;
            color: var(--accent-color);
        }
        
        .menu-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .menu-btn {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-light));
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 0 4px rgba(155, 156, 40, 0.3), 0 10px 30px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(31, 74, 73, 0.6);
        }
        
        .menu-btn:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 0 6px rgba(155, 156, 40, 0.4), 0 15px 40px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(31, 74, 73, 0.8);
        }
        
        .menu-btn i {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--accent-color);
        }
        
        .menu-btn span {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
        }
        
        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-light));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 100;
        }
        
        .admin-btn i {
            font-size: 1.5rem;
            color: var(--accent-color);
        }
        
        .content-panel, .results-panel, .report-panel, .password-panel, .admin-panel {
            display: none;
            width: 100%;
            max-width: 1000px;
            background: rgba(7, 51, 50, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(155, 156, 40, 0.2);
            margin-top: 2rem;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .results-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            max-width: 1200px;
            height: 85vh;
            z-index: 1000;
        }
        
        .back-btn {
            background: transparent;
            border: none;
            color: var(--accent-color);
            font-size: 1.5rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        
        .panel-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
            text-align: center;
        }
        
        .years-container, .member-years-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .year-btn, .member-year-btn, .month-select-btn {
            padding: 0.8rem 1.5rem;
            background: rgba(31, 74, 73, 0.3);
            border: 1px solid rgba(155, 156, 40, 0.3);
            border-radius: 8px;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .year-btn:hover, .member-year-btn:hover, .month-select-btn:hover,
        .year-btn.active, .member-year-btn.active, .month-select-btn.active {
            background: rgba(155, 156, 40, 0.3);
            border-color: var(--accent-color);
        }
        
        .months-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .month-btn, .month-select-item {
            padding: 1rem;
            background: rgba(31, 74, 73, 0.3);
            border: 1px solid rgba(155, 156, 40, 0.3);
            border-radius: 8px;
            color: var(--text-color);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .month-btn:hover, .month-select-item:hover,
        .month-btn.selected, .month-select-item.selected {
            background: rgba(155, 156, 40, 0.3);
            border-color: var(--accent-color);
        }
        
        .member-item {
            padding: 0.8rem;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .member-item.paid { background: rgba(0, 200, 0, 0.3); border-left: 4px solid green; }
        .member-item.unpaid { background: rgba(255, 0, 0, 0.3); border-left: 4px solid red; }
        .member-item.selected { background: rgba(155, 156, 40, 0.5); border: 2px solid var(--accent-color); }
        
        .member-checkbox {
            margin-right: 15px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .select-all-btn {
            padding: 0.5rem 1rem;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: var(--primary-color);
            cursor: pointer;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        
        .action-btn {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-light));
            border: none;
            border-radius: 8px;
            color: var(--text-color);
            cursor: pointer;
            margin: 0.5rem;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-color));
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--accent-color);
        }
        
        .results-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-color);
            font-size: 1.2rem;
        }
        
        .results-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin: 15px 0;
        }
        
        .results-content {
            overflow-y: auto;
            flex: 1;
            max-height: calc(85vh - 100px);
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }
        
        .public-display {
            width: 100%;
            margin-top: 0.2rem;
            padding: 1rem;
            background: rgba(7, 51, 50, 0.6);
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        @media (max-width: 768px) {
            .months-container { grid-template-columns: repeat(2, 1fr); }
            .menu-buttons { flex-direction: column; align-items: center; }
            .menu-btn { width: 250px; }
        }
        
        @media print {
            body * { visibility: hidden; }
            .results-panel, .results-panel * { visibility: visible; }
            .results-panel { position: absolute; top: 0; left: 0; width: 100%; height: auto; background: white; color: black; }
            .results-header, .results-actions { display: none; }
        }
    </style>
</head>
<body>
    <div class="dynamic-bg"></div>
    
    <div class="container">
        <div class="main-menu" id="mainMenu">
            <img src="https://i.postimg.cc/ZYXhnnbN/logo.png" alt="Logo" style="display:block; margin:20px auto; max-width:200px;">
            <h2 class="menu-title">GESTION DES COTISATIONS</h2>
            <h2 class="menu-title">--------</h2>
            <div class="menu-buttons">
                <div class="menu-btn" onclick="showCotisations()">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>PAR MOIS</span>
                </div>
                <div class="menu-btn" onclick="showReportPanel()">
                    <i class="fas fa-envelope"></i>
                    <span>ENVOYER RAPPORT</span>
                </div>
            </div>
        </div>
        
        <!-- Panel Cotisations -->
        <div class="content-panel" id="cotisationsPanel">
            <button class="back-btn" onclick="backToMain()"><i class="fas fa-arrow-left"></i></button>
            <h2 class="panel-header">GESTION DES COTISATIONS</h2>
            <div class="years-container" id="cotisationYears"></div>
            <div class="months-container" id="monthsContainer"></div>
            <div class="members-list" id="membersList"></div>
        </div>
        
        <!-- Panel Envoi Rapport -->
        <div class="content-panel" id="reportPanel">
            <button class="back-btn" onclick="backToMain()"><i class="fas fa-arrow-left"></i></button>
            <h2 class="panel-header">ENVOYER RAPPORT PAR EMAIL</h2>
            
            <div class="years-container" id="reportYears"></div>
            
            <h3 style="margin: 1rem 0 0.5rem;">Sélectionnez le(s) mois :</h3>
            <div class="months-container" id="reportMonths"></div>
            
            <h3 style="margin: 1rem 0 0.5rem;">Sélectionnez les membres :</h3>
            <button class="select-all-btn" onclick="toggleSelectAllMembers()">
                <i class="fas fa-check-double"></i> Tout sélectionner
            </button>
            <div class="members-list" id="reportMembersList"></div>
            
            <div style="text-align: center; margin-top: 2rem;">
                <button class="action-btn" onclick="generateAndSendReport()">
                    <i class="fas fa-paper-plane"></i> GÉNÉRER PDF & ENVOYER
                </button>
            </div>
        </div>
        
        <!-- Panel Résultats -->
        <div class="results-panel" id="resultsPanel">
            <div class="results-header">
                <h2 class="results-title" id="resultsTitle">RÉSULTATS</h2>
                <button class="back-btn" onclick="closeResults()"><i class="fas fa-times"></i></button>
            </div>
            <div class="results-actions">
                <button class="action-btn" onclick="printResults()"><i class="fas fa-print"></i> Imprimer</button>
                <button class="action-btn" id="downloadPdfBtn"><i class="fas fa-download"></i> Télécharger PDF</button>
                <button class="action-btn" id="sendEmailBtn"><i class="fas fa-envelope"></i> Ouvrir Gmail</button>
            </div>
            <div class="results-content" id="resultsList"></div>
        </div>
        
        <div class="overlay" id="resultsOverlay" onclick="closeResults()"></div>
        
        <!-- Bouton Admin -->
        <div class="admin-btn" onclick="showAdminPasswordPanel()">
            <i class="fas fa-lock"></i>
        </div>
        
        <!-- Panel Admin -->
        <div class="admin-panel" id="adminPanel">
            <div class="admin-header">
                <h2 class="admin-title">PANEL ADMINISTRATEUR</h2>
                <button class="close-admin" onclick="closeAdminPanel()"><i class="fas fa-times"></i></button>
            </div>
            <div class="month-selector">
                <select id="yearSelect">
                    <option value="2023">2023</option><option value="2024">2024</option>
                    <option value="2025">2025</option><option value="2026">2026</option>
                    <option value="2027">2027</option>
                </select>
                <select id="monthSelect">
                    <option value="0">Janvier</option><option value="1">Février</option>
                    <option value="2">Mars</option><option value="3">Avril</option>
                    <option value="4">Mai</option><option value="5">Juin</option>
                    <option value="6">Juillet</option><option value="7">Août</option>
                    <option value="8">Septembre</option><option value="9">Octobre</option>
                    <option value="10">Novembre</option><option value="11">Décembre</option>
                </select>
                <button class="add-expense-btn" onclick="updatePublicDisplay()">Afficher Public</button>
            </div>
        </div>
        
        <!-- Panel Mot de Passe -->
        <div class="password-panel" id="passwordPanel">
            <div class="password-header">
                <button class="back-btn-password" onclick="closePasswordPanel()"><i class="fas fa-arrow-left"></i></button>
                <h2 class="password-title">ACCÈS ADMIN</h2>
            </div>
            <div class="password-field">
                <input type="password" id="adminPassword" placeholder="Mot de passe administrateur">
            </div>
            <button class="password-submit" onclick="checkAdminPassword()">ENTRER</button>
            <div class="password-error" id="passwordError">Mot de passe incorrect</div>
        </div>
    </div>
    
    <div class="public-display" id="publicDisplay" style="display: none;">
        <div class="public-header">
            <h3 class="public-title" id="publicTitle"></h3>
        </div>
        <div class="public-members" id="publicMembers"></div>
        <div class="member-count" id="memberCount"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA-TpblN0YnekG2tKFRhjOwwEd80qke5pk",
            authDomain: "ansar-69617.firebaseapp.com",
            projectId: "ansar-69617",
            storageBucket: "ansar-69617.appspot.com",
            messagingSenderId: "1075104578958",
            appId: "1:1075104578958:web:b5d55c76def4d1d430b8df"
        };
        
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let members = [];
        let allMembers = [];
        let currentYear = null;
        let currentMonth = null;
        let reportYear = null;
        let selectedMonths = [];
        let selectedMemberIds = [];
        
        const monthNames = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
        const years = [2023, 2024, 2025, 2026, 2027];
        
        async function loadMembers() {
            try {
                const snapshot = await db.collection("members").get();
                members = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    members.push({
                        id: doc.id,
                        firstname: data.firstname || "",
                        lastname: data.lastname || "",
                        code: data.code || "",
                        email: data.email || "",
                        contributions: formatContributions(data.contributions)
                    });
                });
                members.sort((a, b) => `${a.firstname} ${a.lastname}`.localeCompare(`${b.firstname} ${b.lastname}`));
                allMembers = [...members];
            } catch (error) {
                console.error("Erreur chargement membres:", error);
            }
        }
        
        function formatContributions(contributionsData) {
            const formatted = {};
            if (!contributionsData) return formatted;
            if (contributionsData.Mensuelle) {
                for (const year in contributionsData.Mensuelle) {
                    const months = contributionsData.Mensuelle[year];
                    for (let i = 0; i < months.length; i++) {
                        if (months[i] === true) formatted[`${year}-${i}`] = true;
                    }
                }
            }
            return formatted;
        }
        
        function hasMemberPaid(member, year, month) {
            return member.contributions && member.contributions[`${year}-${month}`] === true;
        }
        
        function backToMain() {
            document.querySelectorAll('.content-panel, .results-panel').forEach(p => p.style.display = 'none');
            document.getElementById('mainMenu').style.display = 'block';
        }
        
        function closeResults() {
            document.getElementById('resultsPanel').style.display = 'none';
            document.getElementById('resultsOverlay').style.display = 'none';
        }
        
        function showCotisations() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('cotisationsPanel').style.display = 'block';
            const container = document.getElementById('cotisationYears');
            container.innerHTML = '';
            years.forEach(y => {
                const btn = document.createElement('button');
                btn.className = 'year-btn';
                btn.textContent = y;
                btn.onclick = () => selectCotisationYear(y, btn);
                container.appendChild(btn);
            });
        }
        
        function selectCotisationYear(year, btn) {
            currentYear = year;
            document.querySelectorAll('#cotisationYears .year-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const monthsContainer = document.getElementById('monthsContainer');
            monthsContainer.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'month-btn';
                monthDiv.textContent = monthNames[i];
                monthDiv.onclick = () => selectMonth(i);
                monthsContainer.appendChild(monthDiv);
            }
        }
        
        function selectMonth(month) {
            currentMonth = month;
            showMembersForMonth();
        }
        
        function showMembersForMonth() {
            document.getElementById('cotisationsPanel').style.display = 'none';
            document.getElementById('resultsPanel').style.display = 'block';
            document.getElementById('resultsTitle').textContent = `COTISATIONS - ${monthNames[currentMonth]} ${currentYear}`;
            const container = document.getElementById('resultsList');
            container.innerHTML = '';
            
            let paidCount = 0, unpaidCount = 0;
            const paidDiv = document.createElement('div');
            paidDiv.innerHTML = '<h3 style="color: green;">MEMBRES COTISÉS</h3>';
            const unpaidDiv = document.createElement('div');
            unpaidDiv.innerHTML = '<h3 style="color: red;">MEMBRES NON COTISÉS</h3>';
            
            members.forEach((member, idx) => {
                const paid = hasMemberPaid(member, currentYear, currentMonth);
                if (paid) {
                    paidCount++;
                    const div = document.createElement('div');
                    div.className = 'member-item paid';
                    div.innerHTML = `<span>${paidCount}. ${member.firstname} ${member.lastname}</span><span>${member.code}</span>`;
                    paidDiv.appendChild(div);
                } else {
                    unpaidCount++;
                    const div = document.createElement('div');
                    div.className = 'member-item unpaid';
                    div.innerHTML = `<span>${unpaidCount}. ${member.firstname} ${member.lastname}</span><span>${member.code}</span>`;
                    unpaidDiv.appendChild(div);
                }
            });
            
            container.appendChild(paidDiv);
            if (paidCount === 0) paidDiv.innerHTML += '<div>Aucun membre cotisé</div>';
            container.appendChild(unpaidDiv);
            if (unpaidCount === 0) unpaidDiv.innerHTML += '<div>Tous les membres sont cotisés</div>';
            
            const summary = document.createElement('div');
            summary.style.marginTop = '20px';
            summary.style.textAlign = 'center';
            summary.innerHTML = `<strong>Total: ${members.length} | Cotisés: ${paidCount} | Non cotisés: ${unpaidCount}</strong>`;
            container.appendChild(summary);
        }
        
        function showReportPanel() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('reportPanel').style.display = 'block';
            selectedMonths = [];
            selectedMemberIds = [];
            
            const yearContainer = document.getElementById('reportYears');
            yearContainer.innerHTML = '';
            years.forEach(y => {
                const btn = document.createElement('button');
                btn.className = 'year-btn';
                btn.textContent = y;
                btn.onclick = () => selectReportYear(y, btn);
                yearContainer.appendChild(btn);
            });
            
            const monthsContainer = document.getElementById('reportMonths');
            monthsContainer.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'month-select-item';
                monthDiv.textContent = monthNames[i];
                monthDiv.onclick = () => toggleMonthSelection(i, monthDiv);
                monthsContainer.appendChild(monthDiv);
            }
            
            displayReportMembersList();
        }
        
        function selectReportYear(year, btn) {
            reportYear = year;
            document.querySelectorAll('#reportYears .year-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        function toggleMonthSelection(month, element) {
            const index = selectedMonths.indexOf(month);
            if (index === -1) {
                selectedMonths.push(month);
                element.classList.add('selected');
            } else {
                selectedMonths.splice(index, 1);
                element.classList.remove('selected');
            }
        }
        
        function displayReportMembersList() {
            const container = document.getElementById('reportMembersList');
            container.innerHTML = '';
            members.forEach(member => {
                const div = document.createElement('div');
                div.className = 'member-item';
                if (selectedMemberIds.includes(member.id)) div.classList.add('selected');
                div.innerHTML = `
                    <input type="checkbox" class="member-checkbox" data-id="${member.id}" ${selectedMemberIds.includes(member.id) ? 'checked' : ''}>
                    <span><strong>${member.firstname} ${member.lastname}</strong> - ${member.code}</span>
                    <span style="font-size: 0.8rem;">${member.email || 'Pas d\'email'}</span>
                `;
                const checkbox = div.querySelector('.member-checkbox');
                checkbox.onchange = (e) => {
                    if (e.target.checked) {
                        if (!selectedMemberIds.includes(member.id)) selectedMemberIds.push(member.id);
                        div.classList.add('selected');
                    } else {
                        selectedMemberIds = selectedMemberIds.filter(id => id !== member.id);
                        div.classList.remove('selected');
                    }
                };
                container.appendChild(div);
            });
        }
        
        function toggleSelectAllMembers() {
            if (selectedMemberIds.length === members.length) {
                selectedMemberIds = [];
            } else {
                selectedMemberIds = members.map(m => m.id);
            }
            displayReportMembersList();
        }
        
        function generatePDFContentForReport(year, months, selectedMembers) {
            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR');
            const monthsSelected = months.map(m => monthNames[m]).join(', ');
            
            let html = `
                <div style="font-family: Arial, sans-serif; padding: 20px;">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <img src="https://i.postimg.cc/ZYXhnnbN/logo.png" style="width: 80px;">
                        <h1 style="color: #073332;">ANSAR ALMOUYASSAR</h1>
                        <h2>RAPPORT DE COTISATIONS - ${monthsSelected} ${year}</h2>
                        <p>Généré le ${dateStr}</p>
                    </div>
            `;
            
            for (const month of months) {
                let paidCount = 0, unpaidCount = 0;
                let paidList = '', unpaidList = '';
                
                for (const member of selectedMembers) {
                    const paid = hasMemberPaid(member, year, month);
                    if (paid) {
                        paidCount++;
                        paidList += `<tr style="background-color: #d4f0d4;"><td>${paidCount}</td><td>${member.firstname} ${member.lastname}</td><td>${member.code}</td></tr>`;
                    } else {
                        unpaidCount++;
                        unpaidList += `<tr style="background-color: #ffcccc;"><td>${unpaidCount}</td><td>${member.firstname} ${member.lastname}</td><td>${member.code}</td></tr>`;
                    }
                }
                
                html += `
                    <div style="margin-bottom: 40px; page-break-inside: avoid;">
                        <h3 style="background: #073332; color: white; padding: 10px;">${monthNames[month]} ${year}</h3>
                        <h4 style="color: green;">Membres cotisés (${paidCount})</h4>
                        <table style="width: 100%; border-collapse: collapse;">
                            <tr style="background: #073332; color: white;"><th>N°</th><th>Nom</th><th>Code</th></tr>
                            ${paidList || '<tr><td colspan="3" style="text-align: center;">Aucun membre cotisé</td></tr>'}
                        </table>
                        <h4 style="color: red; margin-top: 20px;">Membres non cotisés (${unpaidCount})</h4>
                        <table style="width: 100%; border-collapse: collapse;">
                            <tr style="background: #073332; color: white;"><th>N°</th><th>Nom</th><th>Code</th></tr>
                            ${unpaidList || '<tr><td colspan="3" style="text-align: center;">Tous les membres sont cotisés</td></tr>'}
                        </table>
                    </div>
                `;
            }
            
            html += `
                    <div style="margin-top: 40px; text-align: center; font-size: 12px; border-top: 1px solid #ccc; padding-top: 20px;">
                        <p>Pour tous réclamations : MOUHIDINE NIASS - 77 184 77 37 | OUREY DIONE - 77 290 08 08</p>
                        <p>Compte WAVE/Orange Money ANSAR : +221 77 290 08 08</p>
                        <p><strong>ENSEMBLE, SOYONS RÉGULIERS</strong></p>
                    </div>
                </div>
            `;
            return html;
        }
        
        async function generateAndSendReport() {
            if (!reportYear) { alert('Veuillez sélectionner une année'); return; }
            if (selectedMonths.length === 0) { alert('Veuillez sélectionner au moins un mois'); return; }
            if (selectedMemberIds.length === 0) { alert('Veuillez sélectionner au moins un membre'); return; }
            
            const selectedMembers = members.filter(m => selectedMemberIds.includes(m.id));
            const emails = selectedMembers.map(m => m.email).filter(e => e && e.includes('@'));
            
            if (emails.length === 0) {
                alert('Aucun membre sélectionné n\'a d\'adresse email enregistrée');
                return;
            }
            
            const pdfHtml = generatePDFContentForReport(reportYear, selectedMonths, selectedMembers);
            const monthsStr = selectedMonths.map(m => monthNames[m]).join(', ');
            
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = pdfHtml;
            document.body.appendChild(tempDiv);
            
            const opt = { margin: [10,10,10,10], filename: `rapport_${reportYear}_${monthsStr.replace(/ /g, '_')}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            
            html2pdf().set(opt).from(tempDiv).toPdf().get('pdf').then(async function(pdf) {
                const pdfBlob = pdf.output('blob');
                const pdfUrl = URL.createObjectURL(pdfBlob);
                const pdfData = await pdfBlob.arrayBuffer();
                const base64Pdf = btoa(String.fromCharCode(...new Uint8Array(pdfData)));
                
                document.body.removeChild(tempDiv);
                
                const subject = `Rapport de cotisations - ${monthsStr} ${reportYear}`;
                const body = `Bonjour,\n\nVeuillez trouver ci-joint le rapport des cotisations pour ${monthsStr} ${reportYear}.\n\nCordialement,\nANSAR ALMOUYASSAR`;
                
                const emailLinks = emails.map(email => `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`).join(',');
                
                // Sauvegarder le PDF localement et ouvrir Gmail
                const link = document.createElement('a');
                link.href = pdfUrl;
                link.download = `rapport_${reportYear}_${monthsStr.replace(/ /g, '_')}.pdf`;
                link.click();
                
                setTimeout(() => {
                    window.location.href = `mailto:${emails.join(',')}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body + '\n\n📎 Veuillez joindre le PDF téléchargé à cet email.')}`;
                    URL.revokeObjectURL(pdfUrl);
                }, 1000);
                
                alert(`PDF généré !\n\n📧 ${emails.length} destinataires\n📅 ${monthsStr} ${reportYear}\n\nGmail va s'ouvrir. Glissez-déposez le PDF téléchargé dans l'email.`);
            }).catch(err => {
                console.error(err);
                alert('Erreur lors de la génération du PDF');
                if (document.body.contains(tempDiv)) document.body.removeChild(tempDiv);
            });
        }

        function checkAdminPassword() {
            if (document.getElementById('adminPassword').value === 'ADMIN123') {

            } else {
                document.getElementById('passwordError').style.display = 'block';

        function closeAdminPanel() { document.getElementById('adminPanel').style.display = 'none'; }
        function updatePublicDisplay() {
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            localStorage.setItem('publicDisplay', JSON.stringify({ year, month }));
            displayPublicMembers(year, month);
            closeAdminPanel();
            backToMain();
        }
        
        function displayPublicMembers(year, month) {
            document.getElementById('publicTitle').textContent = `COTISATIONS - ${monthNames[month]} ${year}`;
            const container = document.getElementById('publicMembers');
            container.innerHTML = '';
            let paidCount = 0, unpaidCount = 0;
            members.forEach(member => {
                if (hasMemberPaid(member, year, month)) {
                    paidCount++;
                    const div = document.createElement('div');
                    div.className = 'public-member paid';
                    div.innerHTML = `<span>${paidCount}. ${member.firstname} ${member.lastname}</span><span>${member.code}</span>`;
                    container.appendChild(div);
                }
            });
            members.forEach(member => {
                if (!hasMemberPaid(member, year, month)) {
                    unpaidCount++;
                    const div = document.createElement('div');
                    div.className = 'public-member unpaid';
                    div.innerHTML = `<span>${unpaidCount}. ${member.firstname} ${member.lastname}</span><span>${member.code}</span>`;
                    container.appendChild(div);
                }
            });
            document.getElementById('memberCount').innerHTML = `<div>Cotises: <span style="color:green">${paidCount}</span> | Non cotises: <span style="color:red">${unpaidCount}</span></div>`;
            document.getElementById('publicDisplay').style.display = 'block';
        }
         
        document.getElementById('downloadPdfBtn').onclick = () => { alert('Utilisez le bouton "Générer PDF & Envoyer" depuis le panneau d\'envoi'); };
        document.getElementById('sendEmailBtn').onclick = () => { alert('Utilisez le bouton "Générer PDF & Envoyer" depuis le panneau d\'envoi'); };
        
        document.addEventListener('DOMContentLoaded', () => { loadMembers(); });
    </script>

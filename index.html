<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ida Monteiro · Joyeux Anniversaire ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Dancing Script', cursive, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #2b1a1a 0%, #4a2b2b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .site-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 245, 240, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 6px #f9d5c0, 0 0 0 12px #d88c8c;
            padding: 35px 30px 50px;
            position: relative;
            overflow: hidden;
        }

        /* fond cœur subtil */
        .site-container::before {
            content: "❤️";
            font-size: 240px;
            position: absolute;
            top: -40px;
            right: -60px;
            opacity: 0.1;
            transform: rotate(15deg);
            pointer-events: none;
            color: #c44545;
            z-index: 0;
        }

        /* entête */
        .header {
            text-align: center;
            position: relative;
            z-index: 5;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 4.5rem;
            font-weight: 700;
            color: #992525;
            text-shadow: 3px 3px 0 #ffc8b0, 6px 6px 0 rgba(170, 70, 70, 0.3);
            letter-spacing: 2px;
            font-family: 'Dancing Script', cursive;
            line-height: 1.2;
        }

        .header h1 span {
            display: inline-block;
            background: #ffe5d9;
            padding: 0 30px;
            border-radius: 200px;
            box-shadow: inset 0 -5px 0 #d86b6b;
        }

        .sub {
            font-size: 2rem;
            color: #b15454;
            background: #fff2e9;
            display: inline-block;
            padding: 12px 40px;
            border-radius: 60px;
            margin-top: 20px;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(190, 80, 80, 0.3);
            border: 2px solid white;
        }

        .sub i {
            font-style: normal;
            animation: petitCoeur 1.8s infinite;
            display: inline-block;
            margin: 0 5px;
        }

        @keyframes petitCoeur {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: #e63946; }
            100% { transform: scale(1); }
        }

        /* grille principale = défiler & prestation */
        .defile-prestations {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin: 50px 0 40px;
            position: relative;
            z-index: 5;
        }

        /* partie défilement (film photo) */
        .film-section {
            flex: 2;
            min-width: 340px;
            background: #fffbf4;
            border-radius: 60px 60px 30px 30px;
            padding: 30px 25px 40px;
            box-shadow: inset 0 0 30px #ffe2d4, 0 20px 30px #b38b8b;
            border: 4px solid white;
            position: relative;
        }

        .film-section h2, .album-coeur h2 {
            font-size: 2.5rem;
            font-family: 'Dancing Script', cursive;
            color: #6b2e2e;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px dashed #e6a2a2;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .film-section h2 i, .album-coeur h2 i {
            font-size: 2.8rem;
            line-height: 1;
            animation: flottement 3s infinite;
        }

        @keyframes flottement {
            0% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }

        .defile-photos {
            display: flex;
            overflow-x: auto;
            gap: 25px;
            padding: 20px 15px 30px;
            scroll-behavior: smooth;
            border-radius: 50px;
            background: rgba(255, 225, 210, 0.5);
            box-shadow: inset 0 5px 15px #dbb1a1;
            scrollbar-width: thin;
            scrollbar-color: #d66f6f #fad7c0;
        }

        .defile-photos::-webkit-scrollbar {
            height: 12px;
        }
        .defile-photos::-webkit-scrollbar-thumb {
            background: #d66f6f;
            border-radius: 30px;
            border: 3px solid #fad7c0;
        }

        .photo-card {
            flex: 0 0 260px;
            background: white;
            border-radius: 50px 50px 30px 30px;
            padding: 20px 20px 30px;
            box-shadow: 0 20px 30px #c99a8b;
            transition: all 0.25s ease;
            border: 4px solid #ffcfb0;
            transform: rotate(0deg);
            position: relative;
        }

        .photo-card:hover {
            transform: scale(1.02) rotate(0.5deg);
            box-shadow: 0 30px 40px #b14646;
            border-color: #ff9191;
        }

        .photo-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            border-radius: 30px 30px 15px 15px;
            border: 5px solid #ffd5c2;
            background: #f0cfc0;
            box-shadow: 0 10px 0 #9e5d5d;
        }

        .photo-card .legende {
            text-align: center;
            margin-top: 18px;
            font-size: 1.35rem;
            font-weight: 600;
            color: #922020;
            background: #fff0e7;
            padding: 10px 0;
            border-radius: 40px;
            border: 2px solid #ffa1a1;
        }

        /* album coeur (prestations spéciales) */
        .album-coeur {
            flex: 1.2;
            min-width: 300px;
            background: #ffefea;
            border-radius: 70px 70px 40px 40px;
            padding: 30px 25px;
            box-shadow: 0 20px 35px #b17a7a, inset 0 2px 20px #ffe0d0;
            border: 5px solid #ffc6c6;
            position: relative;
        }

        .album-coeur h2 {
            margin-top: 0;
        }

        .grille-coeurs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 22px;
        }

        .prestation-item {
            background: #fce1d4;
            border-radius: 60px 60px 30px 30px;
            padding: 20px 10px 20px;
            text-align: center;
            transition: 0.3s;
            border: 4px solid #ffbaba;
            box-shadow: 0 8px 0 #b45b5b;
            transform: scale(1);
            animation: apparitionCoeur 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.2) both;
            animation-delay: calc(0.05s * var(--i, 1));
        }

        .prestation-item:hover {
            transform: scale(1.08) translateY(-8px);
            box-shadow: 0 18px 0 #994545, 0 20px 25px #d27d7d;
            border-color: #ff7b7b;
        }

        .prestation-item img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid white;
            box-shadow: 0 5px 0 #c25757, 0 0 0 3px #ffcece;
            transition: 0.4s;
        }

        .prestation-item:hover img {
            border-radius: 40% 60% 40% 60%;
            transform: rotate(5deg);
        }

        .prestation-item p {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 15px 0 5px;
            color: #832727;
            background: #fff3f0;
            padding: 5px 5px;
            border-radius: 50px;
            display: inline-block;
            width: 100%;
            border: 2px solid #ff9e9e;
        }

        .prestation-item i {
            font-size: 2rem;
            display: block;
            color: #e63946;
            animation: pulsation 1.2s infinite;
        }

        @keyframes pulsation {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); text-shadow: 0 0 10px red; }
        }

        @keyframes apparitionCoeur {
            0% { opacity: 0; transform: scale(0.1) rotate(0deg); }
            60% { opacity: 0.8; transform: scale(1.1) rotate(2deg); }
        }

        /* banderole FIN + lien */
        .final-message {
            text-align: center;
            background: #fff2e5;
            border-radius: 100px;
            padding: 20px 30px;
            margin-top: 50px;
            border: 5px solid #ffbfbf;
            box-shadow: 0 10px 0 #ad5151;
            position: relative;
            z-index: 7;
        }

        .final-message p {
            font-size: 2.7rem;
            font-family: 'Dancing Script', cursive;
            font-weight: 700;
            color: #b13030;
        }

        .final-message p span {
            display: inline-block;
            background: #ffdac8;
            padding: 0 25px;
            border-radius: 70px;
            margin: 0 10px;
            border: 3px solid white;
        }

        .btn-insert {
            background: #a13e3e;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.7rem;
            border-radius: 120px;
            margin: 30px auto 10px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 12px 0 #5d2b2b, 0 10px 30px #b36464;
            transition: 0.1s linear;
            border: 2px solid #ffbaba;
        }

        .btn-insert:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #5d2b2b;
        }

        /* nuage de coeurs volants (animation JS) */
        .heart-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 2.4rem;
            opacity: 0.7;
            user-select: none;
            animation: chuteCoeur 4s linear forwards;
            color: #f05b5b;
            filter: drop-shadow(0 0 8px #ff8a8a);
        }

        @keyframes chuteCoeur {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
        }

        /* adaptation mobile */
        @media (max-width: 900px) {
            .header h1 { font-size: 3rem; }
            .sub { font-size: 1.6rem; }
            .final-message p { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="site-container" id="siteIda">
    <!-- header IDA MONTEIRO anniversaire -->
    <div class="header">
        <h1><span>✨ Ida Monteiro ✨</span></h1>
        <div class="sub">
            <i>❤️</i> Joyeux anniversaire mon amour <i>❤️</i>
        </div>
    </div>

    <!-- DÉFILÉ + PRESTATIONS (album cœur) -->
    <div class="defile-prestations">
        <!-- partie défilé horizontal -->
        <div class="film-section">
            <h2><i>📷</i> Défilé de nos moments <i>💞</i></h2>
            <div class="defile-photos" id="defilePhotos">
                <!-- Les photos seront injectées via JS (pour que tu mettes tes liens) -->
                <!-- mais je mets des exemples avec placeholder et tu remplaceras -->
            </div>
            <p style="text-align: right; margin-top: 12px; opacity: 0.8; font-style: italic; color:#a14848;">← glisse / défile →</p>
        </div>

        <!-- album cœur (prestations) -->
        <div class="album-coeur">
            <h2><i>❤️‍🔥</i> Prestations cœur <i>💖</i></h2>
            <div class="grille-coeurs" id="grilleCoeurs">
                <!-- Les prestations photos style album cœur seront générées ici -->
            </div>
        </div>
    </div>

    <!-- message de fin + bouton pour animation cœurs -->
    <div class="final-message">
        <p> <span>IDA</span>  notre histoire est une œuvre d'art  <span>MONTEIRO</span></p>
        <button class="btn-insert" id="declencherCoeurs">💓 Faire pleuvoir des cœurs 💓</button>
        <p style="font-size: 1.4rem; margin-top: 15px;">30+ photos · pour toi · xxx</p>
    </div>
</div>

<!-- conteneur pour animation de coeurs -->
<div class="heart-rain" id="heartRainContainer"></div>

<script>
    (function() {
        // ---------- BIENVENUE IDA ----------
        // ICI TU REMPLACERAS LES URL IMAGES PAR TES PROPRES LIENS.
        // J'ai mis des placeholders (picsum) pour l'exemple, mais tu peux mettre n'importe quel hébergement (imgur, google drive lien direct...)
        
        // === LISTE DE TES PHOTOS (plus de 30 liens) ===
        // Tu peux remplacer les liens "https://picsum.photos/..." par tes propres URLs.
        const imagesDefile = [
            "https://picsum.photos/id/1015/400/400",   // paysage
            "https://picsum.photos/id/100/400/400",    // silhouette
            "https://picsum.photos/id/106/400/400",    // fleurs
            "https://picsum.photos/id/102/400/400",    // coucher soleil
            "https://picsum.photos/id/104/400/400",    // cascade
            "https://picsum.photos/id/107/400/400",    // forêt
            "https://picsum.photos/id/108/400/400",    // chien
            "https://picsum.photos/id/114/400/400",    // montagne
            "https://picsum.photos/id/115/400/400",    // fraises
            "https://picsum.photos/id/116/400/400",    // feuilles
            "https://picsum.photos/id/117/400/400",    // livre
            "https://picsum.photos/id/118/400/400",    // coucher
            "https://picsum.photos/id/119/400/400",    // baie
            "https://picsum.photos/id/120/400/400",    // phare
            "https://picsum.photos/id/121/400/400",    // abeille
            "https://picsum.photos/id/122/400/400",    // café
            "https://picsum.photos/id/123/400/400",    // vélo
            "https://picsum.photos/id/124/400/400",    // taxi
            "https://picsum.photos/id/125/400/400",    // pierres
            "https://picsum.photos/id/126/400/400",    // rose
            "https://picsum.photos/id/127/400/400",    // noix
            "https://picsum.photos/id/128/400/400",    // neige
            "https://picsum.photos/id/129/400/400",    // carotte
            "https://picsum.photos/id/130/400/400",    // fraises
            "https://picsum.photos/id/131/400/400",    // ciel
            "https://picsum.photos/id/132/400/400",    // ours
            "https://picsum.photos/id/133/400/400",    // cactus
            "https://picsum.photos/id/134/400/400",    // citron
            "https://picsum.photos/id/135/400/400",    // champ
            "https://picsum.photos/id/136/400/400",    // arbre
            "https://picsum.photos/id/137/400/400",    // rivière
            "https://picsum.photos/id/138/400/400",    // désert
            "https://picsum.photos/id/139/400/400",    // mer
            "https://picsum.photos/id/140/400/400"     // vague
        ];

        // Mêmes photos pour la grille cœur (mais tu peux aussi les changer)
        const imagesPrestations = [...imagesDefile]; // copie (ou tu peux personnaliser)

        // Légendes mignonnes (tu peux modifier)
        const legendesDefile = [
            "Premier regard", "Ton sourire", "Notre printemps", "Été ensemble", "Automne doré",
            "Hiver doux", "Balade", "Rire", "Câlin", "Bisou", "Instant café", "Coucher de soleil",
            "Main dans la main", "Étoiles", "Pont", "Fleurs", " Voyage", "Plage", "Montagne",
            "Sous la pluie", "Brunch", "Anniv", "Surprise", "Douceur", "Rêve", "Matin", "Dîner",
            "Danse", "Musique", "Nous ❤️", "Moment précieux", "Bonheur", "IDAAAA", "Éternité"
        ];

        // Génération du défilé (30+)
        const defileDiv = document.getElementById('defilePhotos');
        defileDiv.innerHTML = ''; // nettoyer

        for (let i = 0; i < imagesDefile.length; i++) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            const imgUrl = imagesDefile[i];
            const legende = legendesDefile[i % legendesDefile.length] + " " + "❤️";
            card.innerHTML = `
                <img src="${imgUrl}" alt="Photo Ida ${i+1}" loading="lazy" onerror="this.src='https://picsum.photos/400/400?random=${i}'">
                <div class="legende">${legende}</div>
            `;
            defileDiv.appendChild(card);
        }

        // Génération de l'album cœur (prestations)
        const grilleCoeur = document.getElementById('grilleCoeurs');
        grilleCoeur.innerHTML = '';
        // on prend les 18 premières pour pas surcharger (mais tu peux modifier)
        const prestoCount = Math.min(imagesPrestations.length, 21); // au moins 18 cœurs
        for (let i = 0; i < prestoCount; i++) {
            const item = document.createElement('div');
            item.className = 'prestation-item';
            item.style.setProperty('--i', i); // pour animation délai
            const imgUrl = imagesPrestations[i];
            const titre = i % 2 === 0 ? "💕 Ida" : "💖 Nous";
            item.innerHTML = `
                <img src="${imgUrl}" alt="presta coeur" loading="lazy" onerror="this.src='https://picsum.photos/200/200?random=${i+100}'">
                <p>${titre}</p>
                <i>❤️</i>
            `;
            grilleCoeur.appendChild(item);
        }

        // === Animation de cœurs volants (bouton) ===
        const heartContainer = document.getElementById('heartRainContainer');
        const boutonCoeurs = document.getElementById('declencherCoeurs');

        function lancerPluieDeCoeurs() {
            for (let i = 0; i < 40; i++) { // une petite pluie généreuse
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
                    heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    heart.style.opacity = Math.random() * 0.8 + 0.2;
                    heartContainer.appendChild(heart);

                    // retirer après animation pour ne pas surcharger DOM
                    setTimeout(() => {
                        heart.remove();
                    }, 7000);
                }, i * 70); // décalé pour effet joli
            }
        }

        boutonCoeurs.addEventListener('click', lancerPluieDeCoeurs);

        // option : petite pluie au chargement (subtile)
        window.addEventListener('load', () => {
            setTimeout(() => {
                lancerPluieDeCoeurs(); // une première volée
            }, 500);
        });

        // === message personnalisé dans la console (clin d'œil) ===
        console.log('%c❤️ Joyeux anniversaire IDA MONTEIRO ❤️', 'background: #ffb6b6; font-size: 16px; padding: 6px; border-radius: 20px; color: #8b1e1e;');
        console.log('%cTu peux remplacer toutes les photos dans le script (partie imagesDefile et imagesPrestations).', 'font-style: italic; color: #a94444');
    })();
</script>

<!-- petite amélioration : Dancing Script depuis Google Fonts (optionnel mais garde le style) -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</body>
</html>
